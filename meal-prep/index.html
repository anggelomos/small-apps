<!doctype html>
<html lang="en">
<head>

  <title>Meal Prep</title>
  <link rel="manifest" href="/manifest.webmanifest">

  <script>
    const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

          { id: "vegetables", amount: { raw: 100, cooked: 100 } }
        ]
      },

        ]
      },
      fishLunch: {

      },

        ingredients: [
          { id: "vegetables", amount: { raw: 100, cooked: 100 } },
          { id: "beef", amount: { raw: 280, cooked: 200 } }
        ]
      },
      fishDinner: {
        label: "Fish dinner",
        ingredients: [
          { id: "vegetables", amount: { raw: 100, cooked: 100 } },
          { id: "fish", amount: { raw: 250, cooked: 200 } }
        ]
      }
    };

    const WEEK_PLAN = {
      Monday: { Breakfast: "breakfast", "Snack 1": "snack", Lunch: "chickenLunch", "Snack 2": "snack", Dinner: "chickenDinner" },
      Tuesday: { Breakfast: "breakfast", "Snack 1": "snack", Lunch: "chickenLunch", "Snack 2": "snack", Dinner: "chickenDinner" },
      Wednesday: { Breakfast: "breakfast", "Snack 1": "snack", Lunch: "chickenLunch", "Snack 2": "snack", Dinner: "chickenDinner" },
      Thursday: { Breakfast: "breakfast", "Snack 1": "snack", Lunch: "beefLunch", "Snack 2": "snack", Dinner: "beefDinner" },
      Friday: { Breakfast: "breakfast", "Snack 1": "snack", Lunch: "fishLunch", "Snack 2": "snack", Dinner: "fishDinner" },
      Saturday: { Breakfast: null, "Snack 1": null, Lunch: null, "Snack 2": null, Dinner: null },
      Sunday: { Breakfast: "breakfast", "Snack 1": "snack", Lunch: "fishLunch", "Snack 2": "snack", Dinner: "fishDinner" }
    };
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #fafbfc;
      --surface-muted: #f4f6f8;
      --ink: #15181d;
      --ink-soft: #2e333b;
      --muted: #7a808a;
      --muted-strong: #5b6069;
      --line: #ececef;
      --line-soft: #f1f2f4;
      --accent: #f08a3c;
      --accent-strong: #d96b1a;
      --accent-soft: #fff1e3;
      --accent-tint: #fff8f1;
      --display-font: "Aptos Display", "Segoe UI Variable Display", "SF Pro Display", Inter, ui-sans-serif, system-ui, sans-serif;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }

    button {
      font: inherit;
    }

    main {
      width: min(100%, 72rem);
      margin: 0 auto;
      padding: 1rem;
    }

    .shell {
      display: grid;
      gap: 1.75rem;
      padding: 1rem 0 2.5rem;
    }

    .hero {
      display: grid;
      gap: 1.25rem;
      padding: 0.75rem 0 0;
    }

    .hero-main {
      display: grid;
      gap: 0.55rem;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .mark {
      position: relative;
      display: grid;
      flex: 0 0 auto;
      place-items: center;
      width: 3.95rem;
      height: 3.95rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      box-shadow: 0 8px 20px rgba(20, 30, 60, 0.07);
    }

    .mark svg {
      width: 3.12rem;
      height: 3.12rem;
    }

    .mark path,
    .mark rect,
    .mark circle {
      vector-effect: non-scaling-stroke;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-family: var(--display-font);
      font-size: clamp(2.1rem, 6vw, 3.35rem);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 760;
      color: var(--ink);
    }

    h2 {
      font-size: 1.35rem;
      line-height: 1.1;
      font-weight: 600;
      letter-spacing: -0.015em;
      color: var(--ink);
    }

    .tagline {
      max-width: 38rem;
      color: var(--ink-soft);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .toggle-wrap {
      display: grid;
      gap: 0.35rem;
      justify-items: start;
    }

    .toggle {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--surface-soft);
    }

    .toggle button {
      min-height: 1.85rem;
      padding: 0 0.95rem;
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: var(--muted-strong);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }

    .toggle button:hover {
      color: var(--ink);
    }

    .toggle button[aria-pressed="true"] {
      background: var(--surface);
      color: var(--accent-strong);
      box-shadow: 0 1px 2px rgba(20, 30, 60, 0.08);
    }

    /* ---------- Weekly table ---------- */

    .table-panel {
      display: none;
    }

    .table-scroll {
      max-height: 76vh;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
    }

    table {
      width: 100%;
      min-width: 60rem;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--surface);
    }

    th,
    td {
      min-width: 8.6rem;
      vertical-align: top;
      border-bottom: 1px solid var(--line-soft);
      background: var(--surface);
    }

    th + th,
    td + td {
      border-left: 1px solid var(--line-soft);
    }

    tbody tr:last-child th,
    tbody tr:last-child td {
      border-bottom: 0;
    }

    th:first-child,
    td:first-child {
      min-width: 7.2rem;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 4;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    thead th:first-child {
      left: 0;
      z-index: 6;
    }

    tbody th {
      position: sticky;
      left: 0;
      z-index: 3;
      background: var(--surface);
      border-right: 1px solid var(--line);
      cursor: pointer;
      transition: background 120ms ease;
    }

    .header-button,
    .cell-button {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      text-align: left;
      cursor: pointer;
      transition: background 120ms ease, color 120ms ease;
    }

    .header-button {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.6rem 0.95rem;
      min-height: 2.4rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      letter-spacing: -0.005em;
    }

    thead .header-button {
      font-size: 0.92rem;
      font-weight: 500;
    }

    tbody .header-button {
      padding: 0.95rem 0.95rem;
      min-height: 100%;
      font-size: 1rem;
    }

    .corner-label {
      display: block;
      padding: 0.55rem 0.85rem;
      min-height: 2.4rem;
    }

    .cell-button {
      display: block;
      padding: 0.85rem 0.95rem 0.95rem;
      line-height: 1.4;
      font-size: 0.9rem;
      color: var(--ink-soft);
    }

    .cell-list {
      margin: 0;
      padding: 0 0 0 1rem;
      list-style: disc;
    }

    .cell-list li::marker {
      color: var(--accent);
      font-size: 0.85em;
    }

    .cell-list li {
      margin-bottom: 0.55rem;
    }

    .cell-list li:last-child {
      margin-bottom: 0;
    }

    .cell-list .name {
      display: block;
      color: var(--ink);
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    .cell-list .qty {
      display: block;
      margin-left: 0.9rem;
      margin-top: 0.05rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
    }

    .cell-button:hover,
    .cell-button:focus-visible {
      background: var(--accent-tint);
      outline: 0;
    }

    thead th:hover,
    tbody th:hover {
      background: var(--accent-tint);
    }

    .header-button:hover,
    .header-button:focus-visible {
      color: var(--accent-strong);
      outline: 0;
    }

    .cell-button:disabled,
    .mobile-cell-button:disabled {
      cursor: default;
    }

    .cell-button:disabled:hover,
    .mobile-cell-button:disabled:hover {
      background: transparent;
    }

    .empty {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .disabled-scope {
      background: var(--surface-muted);
    }

    .disabled-scope .empty,
    .disabled-scope .header-button,
    .disabled-scope .corner-label,
    .disabled-scope .cell-button,
    .disabled-scope .cell-list,
    .disabled-scope .cell-list .name,
    .disabled-scope .cell-list .qty {
      color: #b7bbc2;
    }

    .disabled-scope .cell-list .name,
    .disabled-scope .cell-list .qty {
      text-decoration: line-through;
      text-decoration-thickness: 1px;
      text-decoration-color: #c8ccd2;
    }

    .disabled-scope:hover {
      background: var(--surface-muted);
    }

    /* ---------- Mobile planner ---------- */

    .mobile-planner {
      display: grid;
      gap: 0.85rem;
    }

    .day-card {
      display: grid;
      gap: 0.85rem;
    }

    .day-controls {
      display: grid;
      grid-template-columns: 2.6rem 1fr 2.6rem;
      gap: 0.5rem;
      align-items: center;
    }

    .arrow-button,
    .day-toggle,
    .mobile-meal-toggle,
    .mobile-cell-button {
      border: 1px solid var(--line);
      background: var(--surface);
      color: inherit;
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }

    .arrow-button {
      display: grid;
      place-items: center;
      min-height: 2.6rem;
      border-radius: 5px;
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--muted-strong);
    }

    .day-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      min-height: 2.6rem;
      padding: 0 0.95rem;
      border-radius: 5px;
      font-weight: 500;
      letter-spacing: -0.005em;
      text-align: left;
    }

    .day-toggle small {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .mobile-meals {
      display: grid;
      gap: 0.5rem;
      touch-action: pan-y;
    }

    .mobile-row {
      display: grid;
      grid-template-columns: minmax(6.2rem, 0.4fr) minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 5px;
    }

    .mobile-meal-toggle,
    .mobile-cell-button {
      border: 0;
      border-radius: 0;
      text-align: left;
    }

    .mobile-meal-toggle {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.85rem 0.85rem;
      border-right: 1px solid var(--line);
      background: var(--surface-soft);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted-strong);
    }

    .mobile-cell-button {
      display: block;
      padding: 0.85rem 0.95rem;
      line-height: 1.4;
      font-size: 0.9rem;
      color: var(--ink-soft);
    }

    .arrow-button:hover,
    .arrow-button:focus-visible,
    .day-toggle:hover,
    .day-toggle:focus-visible,
    .mobile-meal-toggle:hover,
    .mobile-meal-toggle:focus-visible,
    .mobile-cell-button:hover,
    .mobile-cell-button:focus-visible {
      border-color: var(--accent);
      background: var(--accent-tint);
      outline: 0;
      color: var(--accent-strong);
    }

    .mobile-meal-toggle:hover,
    .mobile-cell-button:hover {
      color: var(--ink);
    }

    .day-toggle[aria-pressed="true"],
    .mobile-meal-toggle[aria-pressed="true"] {
      color: #b7bbc2;
    }

    /* ---------- Ingredients ---------- */

    .ingredients {
      display: grid;
      gap: 0.9rem;
    }

    .section-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--line);
    }

    .total-view-toggle {
      flex: 0 0 auto;
    }

    .total-view-toggle button {
      min-width: 4.6rem;
    }

    .tiny {
      display: block;
      margin-top: 0.2rem;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .ingredient-output {
      display: grid;
      gap: 0.8rem;
    }

    .ingredient-list {
      display: grid;
      gap: 0;
      margin: 0;
      padding: 0 0 0 1.1rem;
      list-style: disc;
      color: var(--muted-strong);
    }

    .ingredient-list li {
      padding: 0;
      border: 0;
      background: transparent;
      margin-bottom: 0.55rem;
      font-size: 0.9rem;
      line-height: 1.4;
      color: var(--ink-soft);
    }

    .ingredient-list li:last-child {
      margin-bottom: 0;
    }

    .ingredient-list li::marker {
      color: var(--accent);
      font-size: 0.85em;
    }

    .ingredient-list .name {
      display: block;
      color: var(--ink);
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: -0.005em;
    }

    .ingredient-list .qty {
      display: block;
      margin-left: 0.9rem;
      margin-top: 0.05rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-variant-numeric: tabular-nums;
    }

    .empty-note {
      display: block;
      padding: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .day-ingredients-table-wrap {
      display: none;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    .day-ingredients-table {
      width: 100%;
      min-width: 50rem;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--surface);
    }

    .day-ingredients-table th,
    .day-ingredients-table td {
      min-width: 7.1rem;
      border-bottom: 0;
      vertical-align: top;
    }

    .day-ingredients-table th {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
      font-size: 0.9rem;
      font-weight: 600;
      text-align: left;
    }

    .day-ingredients-table td {
      padding: 0.8rem 0.85rem 0.9rem;
    }

    .day-ingredients-table th + th,
    .day-ingredients-table td + td {
      border-left: 1px solid var(--line-soft);
    }

    .day-ingredients-mobile {
      display: grid;
      gap: 0.45rem;
    }

    .day-ingredients-mobile strong {
      color: var(--ink);
      font-size: 0.96rem;
    }

    @media (min-width: 720px) {
      main {
        padding: 1.75rem 1.5rem;
      }

      .shell {
        gap: 2rem;
        padding-top: 1.5rem;
      }

      .hero {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
        gap: 1.5rem;
      }

      .toggle-wrap {
        justify-items: end;
      }

      .table-panel {
        display: block;
      }

      .mobile-planner {
        display: none;
      }

      .day-ingredients-table-wrap {
        display: block;
      }

      .day-ingredients-mobile {
        display: none;
      }
    }

    @media (min-width: 980px) {
      main {
        padding-top: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="shell">
      <header class="hero">
        <div class="hero-main">
          <div class="title-row">
            <div class="mark" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="img">
                <rect x="7.5" y="8.5" width="33" height="31" rx="7.5" fill="#fff" stroke="#15181d" stroke-width="2.4"></rect>
                <path d="M24 8.5v31M7.5 23.5h33" fill="none" stroke="#ececef" stroke-width="2.4"></path>
                <circle cx="15.8" cy="16" r="2.8" fill="#f08a3c"></circle>
                <circle cx="32.2" cy="16" r="2.8" fill="#15181d"></circle>
                <path d="M17.5 32.5l4.4 4.5 9.8-11" fill="none" stroke="#d96b1a" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </div>
            <h1>Meal Prep</h1>
          </div>
          <p class="tagline">Plan the week, tap meals off, and keep the ingredient list aligned with raw or cooked portions.</p>
        </div>

        <div class="toggle-wrap">
          <div class="toggle" role="group" aria-label="Amount mode">
            <button type="button" id="rawButton" aria-pressed="true">Raw</button>
            <button type="button" id="cookedButton" aria-pressed="false">Cooked</button>
          </div>
        </div>
      </header>

      <section class="table-panel" aria-label="Weekly meal prep table">
        <div class="table-scroll">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="mobile-planner" aria-label="Mobile meal prep planner">
        <div class="day-card">
          <div class="day-controls">
            <button class="arrow-button" id="prevDay" type="button" aria-label="Previous day">&#8249;</button>
            <button class="day-toggle" id="mobileDayToggle" type="button" aria-pressed="false"></button>
            <button class="arrow-button" id="nextDay" type="button" aria-label="Next day">&#8250;</button>
          </div>
          <div class="mobile-meals" id="mobileMeals"></div>
        </div>
      </section>

      <section class="ingredients" aria-labelledby="ingredientsTitle">
        <div class="section-head">
          <div>
            <h2 id="ingredientsTitle">Week Ingredients</h2>
            <span class="tiny" id="ingredientMode">Raw totals</span>
          </div>
          <div class="toggle total-view-toggle" role="group" aria-label="Ingredient total view">
            <button type="button" id="weekTotalsButton" aria-pressed="true">Week</button>
            <button type="button" id="dayTotalsButton" aria-pressed="false">Day</button>
          </div>
        </div>
        <div class="ingredient-output" id="ingredientOutput"></div>
      </section>
    </div>
  </main>

  <script>
    const tableHead = document.querySelector("#tableHead");
    const tableBody = document.querySelector("#tableBody");
    const rawButton = document.querySelector("#rawButton");
    const cookedButton = document.querySelector("#cookedButton");
    const weekTotalsButton = document.querySelector("#weekTotalsButton");
    const dayTotalsButton = document.querySelector("#dayTotalsButton");
    const ingredientOutput = document.querySelector("#ingredientOutput");
    const ingredientMode = document.querySelector("#ingredientMode");
    const prevDay = document.querySelector("#prevDay");
    const nextDay = document.querySelector("#nextDay");
    const mobileDayToggle = document.querySelector("#mobileDayToggle");
    const mobileMeals = document.querySelector("#mobileMeals");

    let amountMode = "raw";
    let totalViewMode = "week";
    let currentDayIndex = 0;
    const disabledCells = new Set();

    function cellKey(day, meal) {
      return `${day}::${meal}`;
    }

    function capitalizeFirst(text) {
      if (!text) return text;
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function getMealLabel(meal) {
      return MEAL_LABELS[meal] || meal;
    }

    function formatAmountValue(value, unit) {
      const rounded = Math.round(value);

      if (unit === "unit") {
        const label = rounded === 1 ? "unit" : "units";
        return `${rounded} ${label}`;
      }

      return `${rounded}${unit}`;
    }

    function formatCellLine(item, mode) {
      const ingredient = INGREDIENTS[item.id];
      const amount = item.amount[mode];
      const qty = formatAmountValue(amount, ingredient.unit);
      const name = capitalizeFirst(ingredient.label[mode]);

      return `<li><span class="name">${name}</span><span class="qty">${qty}</span></li>`;
    }

    function getRecipe(day, meal) {
      const recipeId = WEEK_PLAN[day]?.[meal];
      return recipeId ? RECIPES[recipeId] : null;
    }

    function isCellDisabled(day, meal) {
      return disabledCells.has(cellKey(day, meal));
    }

    function getRealCellKeysForDay(day) {
      return MEALS
        .filter((meal) => getRecipe(day, meal))
        .map((meal) => cellKey(day, meal));
    }

    function getRealCellKeysForMeal(meal) {
      return DAYS
        .filter((day) => getRecipe(day, meal))
        .map((day) => cellKey(day, meal));
    }

    function areAllKeysDisabled(keys) {
      return keys.length > 0 && keys.every((key) => disabledCells.has(key));
    }

    function setKeysDisabled(keys, shouldDisable) {
      keys.forEach((key) => {
        if (shouldDisable) {
          disabledCells.add(key);
        } else {
          disabledCells.delete(key);
        }
      });
    }

    function toggleScope(keys) {
      const shouldDisable = !areAllKeysDisabled(keys);
      setKeysDisabled(keys, shouldDisable);
    }

    function validateMealData() {
      const messages = [];
      const expectedDays = new Set(DAYS);
      const expectedMeals = new Set(MEALS);

      Object.keys(WEEK_PLAN).forEach((day) => {
        if (!expectedDays.has(day)) {
          messages.push(`Unexpected day in WEEK_PLAN: ${day}`);
        }
      });

      DAYS.forEach((day) => {
        const plan = WEEK_PLAN[day];

        if (!plan) {
          messages.push(`Missing day in WEEK_PLAN: ${day}`);
          return;
        }

        Object.keys(plan).forEach((meal) => {
          if (!expectedMeals.has(meal)) {
            messages.push(`Unexpected meal in ${day}: ${meal}`);
          }
        });

        MEALS.forEach((meal) => {
          if (!(meal in plan)) {
            messages.push(`Missing ${meal} slot for ${day}`);
            return;
          }

          const recipeId = plan[meal];

          if (recipeId !== null && !RECIPES[recipeId]) {
            messages.push(`Missing recipe "${recipeId}" for ${day} ${meal}`);
          }
        });
      });

      Object.entries(RECIPES).forEach(([recipeId, recipe]) => {
        if (!Array.isArray(recipe.ingredients)) {
          messages.push(`Recipe "${recipeId}" needs an ingredients array`);
          return;
        }

        recipe.ingredients.forEach((item, index) => {
          const location = `${recipeId} ingredient ${index + 1}`;

          if (!INGREDIENTS[item.id]) {
            messages.push(`${location} uses missing ingredient "${item.id}"`);
          }

          ["raw", "cooked"].forEach((mode) => {
            const amount = item.amount?.[mode];

            if (!Number.isFinite(amount) || amount < 0) {
              messages.push(`${location} has invalid ${mode} amount`);
            }
          });
        });
      });

      if (messages.length > 0) {
        console.warn("Meal prep data issues:", messages);
      }
    }

    function renderRecipeLines(recipe) {
      if (!recipe) {
        return '<span class="empty">—</span>';
      }

      const items = recipe.ingredients
        .map((item) => formatCellLine(item, amountMode))
        .join("");

      return `<ul class="cell-list">${items}</ul>`;
    }

    function renderTable() {
      const headerCells = DAYS.map((day) => {
        const isDisabled = areAllKeysDisabled(getRealCellKeysForDay(day));

        return `
          <th class="${isDisabled ? "disabled-scope" : ""}" scope="col">
            <button class="header-button" type="button" data-day="${day}" aria-pressed="${isDisabled}">
              <span>${day}</span>
            </button>
          </th>
        `;
      }).join("");

      tableHead.innerHTML = `
        <tr>
          <th scope="col"><span class="corner-label"></span></th>
          ${headerCells}
        </tr>
      `;

      tableBody.innerHTML = MEALS.map((meal) => {
        const mealDisabled = areAllKeysDisabled(getRealCellKeysForMeal(meal));
        const cells = DAYS.map((day) => {
          const recipe = getRecipe(day, meal);
          const disabled = isCellDisabled(day, meal);

          return `
            <td class="${disabled ? "disabled-scope" : ""}">
              <button class="cell-button" type="button" data-day="${day}" data-meal="${meal}" aria-pressed="${disabled}" ${recipe ? "" : 'disabled aria-label="Empty meal slot"'}>
                ${renderRecipeLines(recipe)}
              </button>
            </td>
          `;
        }).join("");

        return `
          <tr>
            <th class="${mealDisabled ? "disabled-scope" : ""}" scope="row" data-meal="${meal}" aria-pressed="${mealDisabled}">
              <button class="header-button" type="button" data-meal="${meal}" aria-pressed="${mealDisabled}">
                <span>${getMealLabel(meal)}</span>
              </button>
            </th>
            ${cells}
          </tr>
        `;
      }).join("");
    }

    function renderMobile() {
      const day = DAYS[currentDayIndex];
      const isDayDisabled = areAllKeysDisabled(getRealCellKeysForDay(day));

      mobileDayToggle.setAttribute("aria-pressed", String(isDayDisabled));
      mobileDayToggle.classList.toggle("disabled-scope", isDayDisabled);
      mobileDayToggle.innerHTML = `<span>${day}</span><small>${currentDayIndex + 1} / ${DAYS.length}</small>`;

      mobileMeals.innerHTML = MEALS.map((meal) => {
        const recipe = getRecipe(day, meal);
        const mealDisabled = areAllKeysDisabled(getRealCellKeysForMeal(meal));
        const cellDisabled = isCellDisabled(day, meal);

        return `
          <div class="mobile-row ${cellDisabled ? "disabled-scope" : ""}">
            <button class="mobile-meal-toggle" type="button" data-meal="${meal}" aria-pressed="${mealDisabled}">
              <span>${getMealLabel(meal)}</span>
            </button>
            <button class="mobile-cell-button" type="button" data-day="${day}" data-meal="${meal}" aria-pressed="${cellDisabled}" ${recipe ? "" : 'disabled aria-label="Empty meal slot"'}>
              ${renderRecipeLines(recipe)}
            </button>
          </div>
        `;
      }).join("");
    }

    function getTotalsForDays(days) {
      const totals = new Map();

      days.forEach((day) => {
        MEALS.forEach((meal) => {
          const recipe = getRecipe(day, meal);

          if (!recipe || isCellDisabled(day, meal)) {
            return;
          }

          recipe.ingredients.forEach((item) => {
            const ingredient = INGREDIENTS[item.id];
            const key = `${item.id}::${ingredient.unit}`;
            const current = totals.get(key) || { id: item.id, unit: ingredient.unit, amount: 0 };
            current.amount += item.amount[amountMode];
            totals.set(key, current);
          });
        });
      });

      return Array.from(totals.values());
    }

    function renderTotalsList(totals) {
      if (totals.length === 0) {
        return '<span class="empty-note">—</span>';
      }

      const items = totals.map((total) => {
        const ingredient = INGREDIENTS[total.id];
        const name = capitalizeFirst(ingredient.label[amountMode]);
        const qty = formatAmountValue(total.amount, total.unit);

        return `<li><span class="name">${name}</span><span class="qty">${qty}</span></li>`;
      }).join("");

      return `<ul class="ingredient-list">${items}</ul>`;
    }

    function renderDayTotals() {
      const headerCells = DAYS.map((day) => `<th scope="col">${day}</th>`).join("");
      const bodyCells = DAYS.map((day) => `<td>${renderTotalsList(getTotalsForDays([day]))}</td>`).join("");
      const currentDay = DAYS[currentDayIndex];

      return `
        <div class="day-ingredients-table-wrap">
          <table class="day-ingredients-table">
            <thead><tr>${headerCells}</tr></thead>
            <tbody><tr>${bodyCells}</tr></tbody>
          </table>
        </div>
        <div class="day-ingredients-mobile">
          <strong>${currentDay}</strong>
          ${renderTotalsList(getTotalsForDays([currentDay]))}
        </div>
      `;
    }

    function renderIngredients() {
      weekTotalsButton.setAttribute("aria-pressed", String(totalViewMode === "week"));
      dayTotalsButton.setAttribute("aria-pressed", String(totalViewMode === "day"));
      ingredientMode.textContent = `${amountMode === "raw" ? "Raw" : "Cooked"} ${totalViewMode === "week" ? "week" : "daily"} totals`;

      if (totalViewMode === "week") {
        ingredientOutput.innerHTML = renderTotalsList(getTotalsForDays(DAYS));
        return;
      }

      ingredientOutput.innerHTML = renderDayTotals();
    }

    function render() {
      rawButton.setAttribute("aria-pressed", String(amountMode === "raw"));
      cookedButton.setAttribute("aria-pressed", String(amountMode === "cooked"));
      renderTable();
      renderMobile();
      renderIngredients();
    }

    function changeDay(direction) {
      currentDayIndex = (currentDayIndex + direction + DAYS.length) % DAYS.length;
      render();
    }

    rawButton.addEventListener("click", () => {
      amountMode = "raw";
      render();
    });

    cookedButton.addEventListener("click", () => {
      amountMode = "cooked";
      render();
    });

    weekTotalsButton.addEventListener("click", () => {
      totalViewMode = "week";
      render();
    });

    dayTotalsButton.addEventListener("click", () => {
      totalViewMode = "day";
      render();
    });

    tableHead.addEventListener("click", (event) => {
      const button = event.target.closest("[data-day]");

      if (!button) {
        return;
      }

      toggleScope(getRealCellKeysForDay(button.dataset.day));
      button.blur();
      render();
    });

    tableBody.addEventListener("click", (event) => {
      const mealHeader = event.target.closest("th[data-meal]");
      const cell = event.target.closest("td [data-day][data-meal]");

      if (mealHeader) {
        toggleScope(getRealCellKeysForMeal(mealHeader.dataset.meal));
        mealHeader.querySelector("button")?.blur();
        render();
        return;
      }

      if (cell) {
        if (!getRecipe(cell.dataset.day, cell.dataset.meal)) {
          return;
        }

        toggleScope([cellKey(cell.dataset.day, cell.dataset.meal)]);
        render();
      }
    });

    prevDay.addEventListener("click", () => changeDay(-1));
    nextDay.addEventListener("click", () => changeDay(1));

    mobileDayToggle.addEventListener("click", () => {
      toggleScope(getRealCellKeysForDay(DAYS[currentDayIndex]));
      render();
    });

    mobileMeals.addEventListener("click", (event) => {
      const mealButton = event.target.closest(".mobile-meal-toggle");
      const cellButton = event.target.closest(".mobile-cell-button");

      if (mealButton) {
        toggleScope(getRealCellKeysForMeal(mealButton.dataset.meal));
        render();
        return;
      }

      if (cellButton) {
        if (!getRecipe(cellButton.dataset.day, cellButton.dataset.meal)) {
          return;
        }

        toggleScope([cellKey(cellButton.dataset.day, cellButton.dataset.meal)]);
        render();
      }
    });

    let swipeStartX = 0;
    let swipeStartY = 0;

    mobileMeals.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      swipeStartX = touch.clientX;
      swipeStartY = touch.clientY;
    }, { passive: true });

    mobileMeals.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const deltaX = touch.clientX - swipeStartX;
      const deltaY = touch.clientY - swipeStartY;

      if (Math.abs(deltaX) > 48 && Math.abs(deltaX) > Math.abs(deltaY) * 1.4) {
        changeDay(deltaX < 0 ? 1 : -1);
      }
    }, { passive: true });

    validateMealData();
    render();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js");
      });
    }
  </script>
</body>
</html>
