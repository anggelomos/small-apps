<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Small Apps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ed;
      --surface: #ffffff;
      --ink: #24211d;
      --muted: #746d63;
      --line: #ddd3c4;
      --accent: #2f7d5f;
      --accent-soft: #e9f3ed;
      --gold: #c98b2f;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 28rem),
        linear-gradient(145deg, #fbf8f1 0%, var(--bg) 50%, #eee4d4 100%);
      color: var(--ink);
    }

    main {
      width: min(100%, 64rem);
      margin: 0 auto;
      padding: 1.25rem;
    }

    header {
      display: grid;
      gap: 0.65rem;
      padding: 2rem 0 1.25rem;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.35rem, 9vw, 5rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .intro {
      max-width: 36rem;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.16rem);
      line-height: 1.5;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 15rem), 1fr));
      gap: 0.9rem;
      padding: 0.25rem 0 2rem;
    }

    .app-card {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.9rem;
      align-items: center;
      min-height: 7.5rem;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      background: rgba(255, 255, 255, 0.92);
      color: inherit;
      text-decoration: none;
      box-shadow: 0 18px 42px rgba(55, 42, 26, 0.11);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .app-card:hover,
    .app-card:focus-visible {
      border-color: rgba(47, 125, 95, 0.55);
      box-shadow: 0 22px 52px rgba(47, 125, 95, 0.16);
      outline: 0;
      transform: translateY(-2px);
    }

    .icon {
      display: grid;
      place-items: center;
      width: 3.75rem;
      height: 3.75rem;
      border-radius: 0.5rem;
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px rgba(47, 125, 95, 0.14);
    }

    .bowl {
      position: relative;
      width: 2.25rem;
      height: 1.48rem;
      border-radius: 0 0 1.5rem 1.5rem;
      background: var(--accent);
      overflow: hidden;
    }

    .bowl::before {
      content: "";
      position: absolute;
      left: 0.18rem;
      right: 0.18rem;
      top: -0.26rem;
      height: 0.72rem;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 46%, #fff 0 0.11rem, transparent 0.12rem),
        radial-gradient(circle at 48% 34%, #fff 0 0.12rem, transparent 0.13rem),
        radial-gradient(circle at 65% 48%, #fff 0 0.1rem, transparent 0.11rem),
        #f7f0e4;
      border: 0.12rem solid #245f4a;
    }

    .app-card strong {
      display: block;
      margin-bottom: 0.22rem;
      font-size: 1.22rem;
      line-height: 1.2;
    }

    .app-card span {
      display: block;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.4;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      margin-top: 0.65rem;
      padding: 0.22rem 0.48rem;
      border-radius: 999px;
      background: #fff5df;
      color: #60471f;
      font-size: 0.78rem;
      font-weight: 800;
    }

    @media (min-width: 760px) {
      main {
        padding: 2rem;
      }

      header {
        padding-top: 3rem;
      }

      .app-card {
        min-height: 8.25rem;
        padding: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Small Apps</h1>
      <p class="intro">Tiny tools for everyday things. Pick an app and get straight to it.</p>
    </header>

    <section class="gallery" aria-label="Available apps">
      <a class="app-card" href="/rice-cook/">
        <span class="icon" aria-hidden="true">
          <span class="bowl"></span>
        </span>
        <span>
          <strong>Rice Cook</strong>
          <span>Measure raw or cooked rice and get water, oil, salt, and timing.</span>
          <span class="badge">Cooking</span>
        </span>
      </a>
    </section>
  </main>
</body>
</html>
