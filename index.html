<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Small Apps</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --surface: #ffffff;
      --ink: #0a0a0a;
      --muted: #666666;
      --line: #e7e7e7;
      --accent: #10a37f;
      --accent-soft: #f0fbf7;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.06);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(100%, 64rem);
      margin: 0 auto;
      padding: 1.25rem;
    }

    header {
      display: grid;
      gap: 0.7rem;
      padding: 2.75rem 0 1.5rem;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.35rem, 9vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 760;
    }

    .intro {
      max-width: 36rem;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.12rem);
      line-height: 1.5;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(10.5rem, 1fr));
      gap: 1rem;
      padding: 0.25rem 0 2rem;
    }

    .app-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 1rem;
      aspect-ratio: 1 / 1;
      min-height: 0;
      padding: 1rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: var(--surface);
      color: inherit;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .app-card:hover,
    .app-card:focus-visible {
      border-color: rgba(16, 163, 127, 0.45);
      background: #fcfffe;
      box-shadow: 0 22px 60px rgba(16, 163, 127, 0.12);
      outline: 0;
      transform: translateY(-3px);
    }

    .icon {
      display: grid;
      place-items: center;
      width: 3.25rem;
      height: 3.25rem;
      border-radius: 0.9rem;
      background: var(--accent-soft);
      box-shadow: inset 0 0 0 1px rgba(16, 163, 127, 0.12);
    }

    .bowl {
      position: relative;
      width: 2.25rem;
      height: 1.48rem;
      border-radius: 0 0 1.5rem 1.5rem;
      background: var(--accent);
      overflow: hidden;
    }

    .bowl::before {
      content: "";
      position: absolute;
      left: 0.18rem;
      right: 0.18rem;
      top: -0.26rem;
      height: 0.72rem;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 46%, #fff 0 0.11rem, transparent 0.12rem),
        radial-gradient(circle at 48% 34%, #fff 0 0.12rem, transparent 0.13rem),
        radial-gradient(circle at 65% 48%, #fff 0 0.1rem, transparent 0.11rem),
        #f7f0e4;
      border: 0.12rem solid #0f7f64;
    }

    .prep-icon {
      width: 3.65rem;
      height: 3.65rem;
      background: #ffffff !important;
      box-shadow:
        inset 0 0 0 1px #ececef,
        0 8px 20px rgba(20, 30, 60, 0.07) !important;
    }

    .prep-mark {
      width: 2.82rem;
      height: 2.82rem;
    }

    .prep-mark path,
    .prep-mark rect,
    .prep-mark circle {
      vector-effect: non-scaling-stroke;
    }

    .app-card.prep-card:hover,
    .app-card.prep-card:focus-visible {
      border-color: rgba(217, 107, 26, 0.45);
      background: #fffaf3;
      box-shadow: 0 22px 60px rgba(217, 107, 26, 0.12);
    }

    .app-card strong {
      display: block;
      margin-bottom: 0.3rem;
      color: var(--ink);
      font-size: 1.12rem;
      line-height: 1.2;
    }

    .app-card span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .badge {
      display: inline-flex;
      width: fit-content;
      position: absolute;
      top: 0.82rem;
      right: 0.82rem;
      margin-top: 0;
      padding: 0.22rem 0.5rem;
      border-radius: 999px;
      background: #f6f6f6;
      color: #4d4d4d;
      font-size: 0.74rem;
      font-weight: 700;
    }

    .app-copy {
      padding-right: 0.2rem;
    }

    @media (min-width: 760px) {
      main {
        padding: 2rem;
      }

      header {
        padding-top: 3rem;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(12rem, 12rem));
      }

      .app-card {
        padding: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Small Apps</h1>
      <p class="intro">Tiny tools for everyday things. Pick an app and get straight to it.</p>
    </header>

    <section class="gallery" aria-label="Available apps">
      <a class="app-card" href="/rice-cook/">
        <span class="icon" aria-hidden="true">
          <span class="bowl"></span>
        </span>
        <span class="app-copy">
          <strong>Rice Cook</strong>
          <span>Measure raw or cooked rice and get water, oil, salt, and timing.</span>
          <span class="badge">Cooking</span>
        </span>
      </a>

      <a class="app-card prep-card" href="/meal-prep/">
        <span class="icon prep-icon" aria-hidden="true">
          <svg class="prep-mark" viewBox="0 0 48 48">
            <rect x="7.5" y="8.5" width="33" height="31" rx="7.5" fill="#fff" stroke="#15181d" stroke-width="2.4"></rect>
            <path d="M24 8.5v31M7.5 23.5h33" fill="none" stroke="#ececef" stroke-width="2.4"></path>
            <circle cx="15.8" cy="16" r="2.8" fill="#f08a3c"></circle>
            <circle cx="32.2" cy="16" r="2.8" fill="#15181d"></circle>
            <path d="M17.5 32.5l4.4 4.5 9.8-11" fill="none" stroke="#d96b1a" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </span>
        <span class="app-copy">
          <strong>Meal Prep</strong>
          <span>Tap weekly meals on or off and total raw or cooked ingredients.</span>
          <span class="badge">Prep</span>
        </span>
      </a>
    </section>
  </main>
</body>
</html>
